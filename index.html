<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Imersão</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- fontawesome icons -->
    <script src="https://kit.fontawesome.com/dfcebf96e5.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="sidebar">
        <nav class="sidebar__navigation">
            <div class="logo">
                <a href="#">
                    <img src="./assets/icons/logo-spotify.png" alt="logo Spotify">
                </a>
            </div>
            <div class="menu">
                <ul>
                    <li>
                        <a href="#">
                            <span class="fa-solid fa-house"></span>
                            <span>Início</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="fa-solid fa-magnifying-glass"></span>
                            <span>Buscar</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <nav class="sidebar__navigation sidebar__biblioteca">
            <div class="biblioteca">
                <ul>
                    <li>
                        <a href="#">
                            <span class="fa-solid fa-book"></span>
                            <span>Sua biblioteca</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="fa-solid fa-plus"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</body>
</html>
